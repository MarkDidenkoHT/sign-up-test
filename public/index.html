<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Hi-Tech</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="theme-init.js"></script>
  <link rel="icon" href="/assets/icons/logo_glowing_animated_2.svg" type="image/svg+xml">
  <link rel="stylesheet" href="themes.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="app-body">

<div id="app-sidebar-container" style="display: none;">
  <aside id="appMenuDesktop" class="app-sidebar">
    <div id="appSidebarToggle" class="app-sidebar-toggle">
      <div class="app-menu-icon">
        <img id="appCompanyLogo" src="https://hi-tech.md/images/m1/app/logo_glowing_animated_2.svg">
      </div>
    </div>
    <nav id="appMenuDesktopItems" class="app-menu-items"></nav>
  </aside>
</div>

  <button id="appMenuToggle" class="app-menu-toggle">☰</button>

  <div id="appMenuMobileDropdown" class="app-menu-mobile hidden">
    <nav id="appMenuMobileItems" class="app-menu-items"></nav>
    <div class="mobile-theme-toggle">
      <span class="mobile-theme-label">Тема</span>
      <div class="mobile-theme-pill">
        <button class="mobile-theme-btn" data-theme="dark" title="Тёмная">
            <img src="/assets/icons/dark/dark_theme.png" alt="Dark theme">
        </button>

        <button class="mobile-theme-btn" data-theme="light" title="Светлая">
            <img src="/assets/icons/light/light_theme.png" alt="Light theme">
        </button>
      </div>
    </div>
  </div>

  <main class="app-main">
    <div id="appMain"></div>
    <div id="appLoader" class="app-loader">
      <div class="loader-logo">
        <img src="https://hi-tech.md/images/m1/app/logo_glowing_animated_2.svg" alt="Hi-Tech Logo">
      </div>
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </main>

  <script src="public_test.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
